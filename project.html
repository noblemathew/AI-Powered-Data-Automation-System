<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project · One Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">OP</div>
      <div class="name">One Portal</div>
    </div>
    <nav>
      <a class="nav-link" href="dashboard.html"><span class="ico">&#8962;</span> Dashboard</a>
    </nav>
    <div class="sidebar-foot">
      <a class="logout-link" href="#" id="logoutLink"><span class="ico">&#8630;</span> Sign out</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="greeting" id="greeting">Hi …</div>
      <div class="avatar" id="avatar">?</div>
    </div>

    <div class="content">
      <a class="back-link" href="dashboard.html">&larr; All projects</a>

      <div class="section-head">
        <div>
          <h2 id="projectName">Loading…</h2>
          <p>AI tools enabled for this project</p>
        </div>
      </div>

      <div class="tile-grid" id="toolGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script>
  const TOOL_ICONS = {
    "webscraper":     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18M3 12h18"/></svg>`,
    "task-planner":   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
    "doc-summarizer": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h6"/></svg>`,
    "meeting-notes":  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3M16 3v3M4 8h16M5 5h14a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/><path d="m9 14 2 2 4-4"/></svg>`,
    "interview-agent": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12a4 4 0 1 1 8 0v2a4 4 0 0 1-8 0z"/><path d="M5 11v2a7 7 0 0 0 14 0v-2M12 20v2"/></svg>`
  };
  const TOOL_COLORS = {
    "webscraper":     { bg: "var(--accent-dim)", fg: "var(--accent)" },
    "task-planner":   { bg: "var(--amber-dim)",  fg: "#9a6c14" },
    "doc-summarizer": { bg: "var(--success-dim)",fg: "var(--success)" },
    "meeting-notes":  { bg: "#F1E8FF",           fg: "#6C4CF2" },
    "interview-agent":{ bg: "var(--success-dim)",fg: "var(--success)" }
  };

  const params = new URLSearchParams(window.location.search);
  const projectId = params.get("id");

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2600);
  }

  async function api(path) {
    const res = await fetch(PROXY_URL + path, { credentials: "include" });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || `Request failed (${res.status})`);
    }
    return res.json();
  }

  document.getElementById("logoutLink").addEventListener("click", (e) => { e.preventDefault(); logout(); });

  (async function init() {
    const me = await requireSession();
    if (!me) return;
    document.getElementById("greeting").innerHTML =
      `Hi ${me.display_name || me.email} <span class="role-badge">${me.role}</span>`;
    document.getElementById("avatar").textContent = initials(me.display_name || me.email);

    if (!projectId) {
      document.getElementById("projectName").textContent = "No project selected";
      return;
    }

    try {
      const project = await api(`/api/projects/${projectId}`);
      document.getElementById("projectName").textContent = project.name;

      const tools = await api(`/api/projects/${projectId}/tools`);
      const grid = document.getElementById("toolGrid");
      grid.innerHTML = "";

      if (tools.length === 0) {
        grid.innerHTML = `<div class="empty">No tools enabled for this project yet.</div>`;
        return;
      }

      tools.forEach(tool => {
        const colors = TOOL_COLORS[tool.slug] || { bg: "var(--accent-dim)", fg: "var(--accent)" };
        const icon = TOOL_ICONS[tool.slug] || `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/></svg>`;
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.innerHTML = `
          <div class="tile-icon" style="background:${colors.bg}; color:${colors.fg};">${icon}</div>
          <div class="tile-title">${tool.name}</div>
          <div class="tile-sub">${tool.description}</div>
          <div style="margin-top:12px; font-size:12px; font-weight:600; color:var(--accent);">Open tool →</div>`;
        tile.addEventListener("click", () => {
          if (tool.slug === "webscraper") {
            window.location.href = `tools/webscraper/home.html?project=${projectId}`;
          } else if (tool.slug === "interview-agent") {
            window.location.href = `tools/interview-agent/index.html?project=${projectId}`;
          } else {
            window.location.href = `tools/coming-soon.html?tool=${encodeURIComponent(tool.name)}`;
          }
        });
        grid.appendChild(tile);
      });
    } catch (err) {
      showToast(err.message);
    }
  })();
</script>
</body>
</html>
